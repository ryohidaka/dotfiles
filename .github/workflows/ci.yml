name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      # nix-darwin configurations cannot be built on Linux.
      # Only check flake syntax and evaluation.
      - name: Check flake
        run: nix flake check --no-build
